      - Government-to-government engagement
      - Compliance with consultation requirements
  - aid: bureau-of-indian-affairs:bureau-of-indian-education
    name: Bureau of Indian Education
    description: >-
      The Bureau of Indian Education (BIE) supports programs serving more than
      46,000 students across 183 schools, including BIE-operated and
      tribally-controlled schools, plus postsecondary institutions, providing
      culturally relevant education to Indian students.
    humanURL: https://www.bie.edu/
