aid: bureau-of-indian-affairs
name: Bureau of Indian Affairs
description: >-
  The Bureau of Indian Affairs (BIA) is the oldest bureau in the U.S.
  Department of the Interior. Its mission is to enhance the quality of life,
  promote economic opportunity, and carry out the federal responsibility to
  protect and improve the trust assets of American Indians, Indian tribes, and
  Alaska Natives. The BIA administers services directly or through contracts,
  grants, and compacts with 574 federally recognized tribes serving
  approximately 2.5 million people. BIA publishes geospatial datasets,
  directories, and forms through the Indian Affairs GIS Open Data portal, the
  Tribal Leader Directory, and official agency websites.
